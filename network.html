<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネットワーク基礎 練習問題 (全50問)</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムスタイルの追加 */
        .option-label {
            transition: all 0.2s ease-in-out;
        }
        .option-label:hover {
            background-color: #f3f4f6;
            cursor: pointer;
        }
        input[type="radio"]:checked + .option-text {
            font-weight: bold;
            color: #2563eb;
        }
        .correct-bg { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .incorrect-bg { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
        .progress-bar-fill {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        
        <!-- ヘッダー -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">ネットワーク基礎 練習問題</h1>
            <p class="mt-3 text-lg text-gray-500">提示された資料に基づくレイヤー1〜WANまでの総合確認テスト</p>
            <div class="mt-6 flex flex-wrap justify-center gap-2">
                <a href="index.html" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-full text-sm font-bold hover:bg-gray-400 transition">JSP / Servlet</a>
            </div>
        </div>

        <!-- クイズ進行状況 -->
        <div id="progress-container" class="mb-4 flex items-center justify-between bg-white px-6 py-3 rounded-lg shadow-sm border border-gray-200">
            <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Progress</span>
            <span class="text-lg font-bold text-blue-600">問題 <span id="current-q-num">1</span> / <span id="total-q-num">50</span></span>
        </div>

        <!-- クイズエリア（1問ずつ表示） -->
        <div id="quiz-area">
            <!-- エラーメッセージ -->
            <div id="error-message" class="hidden mb-6 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
                <strong class="font-bold">エラー: </strong>
                <span class="block sm:inline">選択肢を選んでから「解答する」を押してください。</span>
            </div>
            
            <div id="question-container" class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 mb-6">
                <!-- JavaScriptでここに1問分の内容が生成されます -->
            </div>

            <!-- コントロールボタン -->
            <div class="mt-6 text-center">
                <button type="button" id="submit-answer-btn" onclick="checkAnswer()" class="inline-flex items-center px-8 py-3 border border-transparent text-lg font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    解答する
                </button>
                <button type="button" id="next-question-btn" onclick="nextQuestion()" class="hidden inline-flex items-center px-8 py-3 border border-transparent text-lg font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors">
                    次の問題へ
                </button>
                <button type="button" id="show-result-btn" onclick="showFinalResult()" class="hidden inline-flex items-center px-8 py-3 border border-transparent text-lg font-medium rounded-md shadow-sm text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-colors">
                    結果を見る
                </button>
            </div>
        </div>

        <!-- 最終結果表示エリア（初期状態は非表示） -->
        <div id="result-section" class="hidden mb-8 bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">テスト結果</h2>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-8 mb-6">
                <div class="text-center">
                    <p class="text-sm text-gray-500 uppercase tracking-wide">正答数</p>
                    <p class="text-5xl font-extrabold text-blue-600"><span id="score-count">0</span><span class="text-2xl text-gray-400"> / <span id="result-total-count">50</span></span></p>
                </div>
                <div class="w-full sm:w-1/2">
                    <div class="flex justify-between mb-1">
                        <span class="text-base font-medium text-blue-700">正答率</span>
                        <span id="score-percentage-text" class="text-base font-medium text-blue-700">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-4">
                        <div id="score-progress" class="bg-blue-600 h-4 rounded-full progress-bar-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <p id="result-message" class="text-center text-lg font-medium text-gray-700 mb-8"></p>
            
            <div class="text-center">
                <button type="button" onclick="resetQuiz()" class="inline-flex items-center px-8 py-3 border border-gray-300 text-lg font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    もう一度挑戦する
                </button>
            </div>
        </div>

    </div>

    <script>
        // 全50問の問題データ
        const quizData = [
            // --- ネットワーク基礎 ---
            {
                question: "IT業界における「ネットワーク」の一般的な定義として最も適切なものはどれか？",
                options: ["人を網状につなげたもの", "コンピュータや機器を相互接続したもの", "道路や鉄道の交通網のこと", "インターネット上のWebサイトの集合体"],
                correctIndex: 1,
                rationale: "IT業界におけるネットワークとは、複数のコンピュータや通信機器を相互に接続した状態や、その技術のことを指します。"
            },
            {
                question: "LAN（Local Area Network）の説明として正しいものはどれか？",
                options: ["世界中のコンピュータを相互接続する巨大なネットワーク", "離れた支社同士を接続するための広域ネットワーク", "家庭や会社内など、比較的狭い範囲で構築されるネットワーク", "携帯電話の基地局を利用した無線ネットワーク"],
                correctIndex: 2,
                rationale: "LANは家庭やオフィスなど、特定の比較的狭い範囲で機器を接続するネットワークです。離れた拠点間をつなぐのはWANです。"
            },
            {
                question: "WAN（Wide Area Network）の説明として正しいものはどれか？",
                options: ["家庭内に限定されたネットワーク", "離れたLAN同士（本社と支社など）を通信事業者の回線を利用して接続するネットワーク", "Bluetoothなどを利用した近距離無線ネットワーク", "不特定多数の人が自由に接続できる公衆Wi-Fi"],
                correctIndex: 1,
                rationale: "WANは、NTTやKDDIなどの電気通信事業者の回線を利用して、離れた場所にあるLAN同士を相互に接続する広域ネットワークです。"
            },
            
            // --- モデルとアーキテクチャ ---
            {
                question: "OSI参照モデルは、ネットワークの機能をいくつの階層に分けて定義しているか？",
                options: ["4階層", "5階層", "7階層", "9階層"],
                correctIndex: 2,
                rationale: "OSI参照モデルは、通信機能を第1層（物理層）から第7層（アプリケーション層）までの7つの階層に分割して定義しています。"
            },
            {
                question: "TCP/IPの階層モデルは、いくつの階層で構成されているか？",
                options: ["3階層", "4階層", "6階層", "7階層"],
                correctIndex: 1,
                rationale: "TCP/IPモデルは、ネットワークインターフェース層、インターネット層、トランスポート層、アプリケーション層の4階層で構成されます。"
            },
            {
                question: "OSI参照モデルの「第1層」にあたるものはどれか？",
                options: ["ネットワーク層", "トランスポート層", "データリンク層", "物理層"],
                correctIndex: 3,
                rationale: "第1層は「物理層」であり、LANケーブルやWi-Fiの電波など、物理的な接続や信号の電気的な変換などを規定します。"
            },
            {
                question: "OSI参照モデルの「第3層（ネットワーク層）」の主な役割として適切なものはどれか？",
                options: ["送信元から宛先へのデータを最適な経路で転送（ルーティング）する", "直接接続された機器同士でMACアドレスを使ってデータをやり取りする", "アプリケーションごとの固有の規定（HTTPやSMTPなど）を定める", "物理的なケーブルの材質やコネクタの形状を規定する"],
                correctIndex: 0,
                rationale: "ネットワーク層（レイヤー3）は、IPアドレスを使用して異なるネットワークを越えて宛先までデータを届けるための経路制御（ルーティング）を行います。"
            },

            // --- レイヤー1 ---
            {
                question: "LANケーブルの接続において、PCとPCなど「同じ役割の機器」を直接接続する際に（原則として）使用するケーブルはどれか？",
                options: ["ストレートケーブル", "クロスケーブル", "同軸ケーブル", "光ファイバーケーブル"],
                correctIndex: 1,
                rationale: "PC同士やハブ同士など同じ役割の機器を接続する場合は、送信側と受信側のピンの配線を交差させた「クロスケーブル」を使用します。"
            },
            {
                question: "現在の多くの通信機器に搭載されている、ストレートケーブルとクロスケーブルを自動的に判別して通信できるようにする機能は何と呼ばれるか？",
                options: ["Auto-Negotiation", "AutoMDI/MDI-X", "DHCP", "CSMA/CD"],
                correctIndex: 1,
                rationale: "AutoMDI/MDI-X機能により、機器が自動的にケーブルの種類（ストレート/クロス）を判別し、適切に送受信のピンを切り替えるため、現在はストレートケーブルだけでほとんどの接続が可能になっています。"
            },
            {
                question: "Wi-Fiの「2.4GHz帯（IEEE802.11b/g/nなど）」の特徴として正しいものはどれか？",
                options: ["壁などの障害物に強く遠くまで届きやすいが、電子レンジなどと電波干渉を起こしやすい", "通信速度が非常に高速だが、障害物に弱く減衰しやすい", "屋外での利用が法律で厳しく制限されている", "Bluetooth機器とは一切干渉しない"],
                correctIndex: 0,
                rationale: "2.4GHz帯は障害物を回り込む特性があるため遠くまで届きやすいですが、電子レンジやBluetoothなど多くの機器で利用されている帯域のため電波干渉が起きやすいのが特徴です。"
            },
            {
                question: "Wi-Fiの「5GHz帯（IEEE802.11a/acなど）」の特徴として正しいものはどれか？",
                options: ["電子レンジなどの家電と電波干渉を起こしやすい", "障害物を回り込みやすく、遠くまで届きやすい", "壁などの障害物に弱く、減衰しやすい", "屋外での利用が法律で一切制限されていない"],
                correctIndex: 2,
                rationale: "5GHz帯は電子レンジなどとの干渉が少なく高速ですが、直進性が高く壁などの「障害物に弱い（減衰しやすい）」のが特徴です。また気象レーダー等との干渉を避けるため屋外利用には一部制限があります。"
            },

            // --- レイヤー2 ---
            {
                question: "データリンク層（レイヤー2）で扱われるデータの単位（まとまり）はどれか？",
                options: ["セグメント", "パケット", "フレーム", "メッセージ"],
                correctIndex: 2,
                rationale: "OSI参照モデルのデータリンク層で扱われるデータの単位は「フレーム」です。ネットワーク層では「パケット」、トランスポート層（TCP）では「セグメント」と呼ばれます。"
            },
            {
                question: "レイヤー2（データリンク層）で動作し、MACアドレスを判断材料として通信を振り分ける主な機器はどれか？",
                options: ["リピーターハブ", "ルーター", "L2スイッチ", "ロードバランサ"],
                correctIndex: 2,
                rationale: "L2スイッチは、接続された機器のMACアドレスを学習してアドレステーブルを作成し、宛先のMACアドレスが登録されているポートにのみデータを転送します。"
            },
            {
                question: "L2スイッチが、受信したフレームの宛先MACアドレスを「知らない（アドレステーブルに未登録である）」場合、どのような動作を行うか？",
                options: ["そのフレームを破棄する", "送信元にエラーメッセージを返す", "受信したポート以外のすべてのポートにフレームを転送（フラッディング）する", "ルーターに転送して処理を任せる"],
                correctIndex: 2,
                rationale: "L2スイッチは宛先MACアドレスを知らない場合、接続されている全機器に対して信号を流します（フラッディング）。該当機器が応答することでMACアドレスを学習します。"
            },
            {
                question: "MACアドレスの構成として正しいものはどれか？",
                options: ["32ビットで構成され、ネットワーク部とホスト部に分かれる", "48ビットで構成され、前半24ビットがベンダーID（メーカー識別子）、後半24ビットが機器固有の番号となる", "128ビットで構成され、16進数で表記される", "ポート番号と組み合わせて64ビットで構成される"],
                correctIndex: 1,
                rationale: "MACアドレスは48ビットの物理アドレスで、世界中で重複しないように管理されています。前半24ビット（OUI）で製造メーカーを、後半24ビットで固有番号を表します。"
            },
            {
                question: "MACアドレスの表記方法として一般的なものはどれか？",
                options: ["192.168.1.1", "FF-EE-DD-CC-BB-AA", "2001:db8::1", "1234-5678-90AB-CDEF"],
                correctIndex: 1,
                rationale: "MACアドレスは通常、16進数を2桁ずつハイフン（-）やコロン（:）で6つに区切って表記します（例: FF-EE-DD-CC-BB-AA）。"
            },

            // --- レイヤー3 (IPアドレス、計算) ---
            {
                question: "IPv4アドレスの長さ（ビット数）はどれか？",
                options: ["16ビット", "32ビット", "48ビット", "128ビット"],
                correctIndex: 1,
                rationale: "IPv4アドレスは32ビットで構成されています。"
            },
            {
                question: "IPv4アドレスの一般的な表記方法として正しいものはどれか？",
                options: ["16進数を2桁ずつハイフンで区切って表記する", "8ビットずつドット（.）で区切り、10進数で表記する", "16ビットずつコロン（:）で区切り、16進数で表記する", "2進数のまま32桁で表記する"],
                correctIndex: 1,
                rationale: "IPv4アドレスは32ビットを8ビットずつの4つ（オクテット）に分け、それぞれを10進数に直してドットで区切って表記します（例：192.168.0.1）。"
            },
            {
                question: "自分自身を指す仮想的なIPアドレス（例：127.0.0.1）を何と呼ぶか？",
                options: ["ループバックアドレス", "ブロードキャストアドレス", "ネットワークアドレス", "グローバルアドレス"],
                correctIndex: 0,
                rationale: "ループバックアドレスは、自分自身（ローカルホスト）を指す特殊なIPアドレスです。OSの内部処理やネットワーク機能のテストなどに利用され、外部には送信されません。"
            },
            {
                question: "ブロードキャストアドレスの特徴として正しいものはどれか？",
                options: ["IPアドレスのホスト部がすべて「0」のアドレスである", "IPアドレスのホスト部がすべて「1」のアドレスである", "インターネット上で世界中の全PCに一斉送信するためのアドレスである", "ルーター自身のIPアドレスとして予約されている"],
                correctIndex: 1,
                rationale: "ブロードキャストアドレスは、ホスト部をすべて「1」（2進数で）にしたアドレスで、同一ネットワーク内（LAN内）のすべてのコンピュータに対して一斉にデータを送信する際に使用されます。"
            },
            {
                question: "ネットワークアドレスの特徴として正しいものはどれか？",
                options: ["ネットワークそのものを指し示すアドレスであり、ホスト部がすべて「0」である", "ネットワーク内の特定の1台のコンピュータに割り当てられるアドレスである", "ホスト部がすべて「1」のアドレスである", "通信エラーが発生した際に自動的に割り当てられるアドレスである"],
                correctIndex: 0,
                rationale: "ネットワークアドレスは「どのネットワークか」を表すアドレスで、ホスト部がすべて「0」になります。コンピュータに個別に割り当てることはできません。"
            },
            {
                question: "ネットマスク（サブネットマスク）の主な役割はどれか？",
                options: ["プライベートIPアドレスをグローバルIPアドレスに変換する", "通信データを暗号化して安全性を高める", "IPアドレスから「ネットワーク部」と「ホスト部」を区別・抽出する", "MACアドレスからIPアドレスを自動的に検索する"],
                correctIndex: 2,
                rationale: "ネットマスクは、32ビットのIPアドレスのうち、どこまでが「ネットワーク部」で、どこからが「ホスト部」なのかを示すための値です。"
            },
            {
                question: "IPアドレスが「192.168.5.123」、ネットマスクが「255.255.255.0」の場合のネットワークアドレスはどれか？",
                options: ["192.168.5.123", "192.168.5.255", "192.168.5.0", "192.168.0.0"],
                correctIndex: 2,
                rationale: "ネットマスク「255.255.255.0」は上位24ビットがネットワーク部であることを示します。ホスト部（第4オクテット）をすべて「0」にしたものがネットワークアドレスとなるため、「192.168.5.0」が正解です。"
            },
            {
                question: "IPアドレスの「クラスA」の特徴として正しいものはどれか？",
                options: ["先頭の8ビットがネットワーク部であり、大規模なネットワーク向けである", "先頭の16ビットがネットワーク部である", "先頭の24ビットがネットワーク部であり、小規模なネットワーク向けである", "マルチキャスト通信専用のクラスである"],
                correctIndex: 0,
                rationale: "クラスAはネットワーク部が8ビット、ホスト部が24ビットで構成され、1つのネットワークに約1600万台のホストを接続できる大規模ネットワーク向けのクラスです。"
            },
            {
                question: "IPアドレスの「クラスC」のネットワーク部の長さ（標準のネットマスク）はどれか？",
                options: ["8ビット", "16ビット", "24ビット", "32ビット"],
                correctIndex: 2,
                rationale: "クラスCはネットワーク部が24ビット、ホスト部が8ビット（標準ネットマスク 255.255.255.0）で構成され、1ネットワークあたり254台の機器を接続できます。"
            },
            {
                question: "クラスDのIPアドレス（224.0.0.0〜239.255.255.255）はどのような用途で使用されるか？",
                options: ["大規模企業のプライベートIPアドレスとして", "特定のグループに属する複数のホストへ同時にデータを送る「マルチキャスト通信」用として", "将来のための実験・研究用として", "ループバック通信の専用アドレスとして"],
                correctIndex: 1,
                rationale: "クラスDは特定の複数の宛先に同時にデータを送信する「マルチキャスト通信」のために予約されたアドレス帯域です。"
            },
            {
                question: "サブネットマスクを用いてネットワークを分割する（サブネット化）メリットはどれか？",
                options: ["グローバルIPアドレスが不要になる", "IPアドレスの無駄遣いを防ぎ、ブロードキャストが届く範囲を狭めてネットワークの負荷を軽減できる", "ルーターを使用せずに異なるネットワーク間の通信が可能になる", "通信データを自動的に暗号化できる"],
                correctIndex: 1,
                rationale: "サブネット化により、限られたIPアドレスを効率的に割り当てることができ、また無駄なブロードキャスト通信がネットワーク全体に広がるのを防ぐことができます。"
            },

            // --- レイヤー3 (グローバル、プライベート、NAT、IPv6) ---
            {

            // UIのリセット
            document.getElementById('error-message').classList.add('hidden');

            document.getElementById('next-question-btn').classList.add('hidden');
            document.getElementById('show-result-btn').classList.add('hidden');

            const container = document.getElementById('question-container');
            
            // 選択肢のHTML生成
            let optionsHtml = '';
            item.options.forEach((opt, optIndex) => {
                optionsHtml += `

        // 解答して採点する処理
        function checkAnswer() {
            const selected = document.querySelector(`input[name="current-q"]:checked`);
            
            // 未選択チェック
            if (!selected) {
                document.getElementById('error-message').classList.remove('hidden');
                return;
            }
            
            document.getElementById('error-message').classList.add('hidden');
            const userAnswer = parseInt(selected.value);
            const item = quizData[currentQuestionIndex];
            const isCorrect = (userAnswer === item.correctIndex);
            
            // 正解ならスコア加算
            if (isCorrect) {
                score++;
            }

            // ラジオボタンの入力を無効化（選び直し防止）
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
            
            // 選択肢のスタイル更新
            const selectedLabel = document.getElementById(`label-${currentQuestionIndex}-${userAnswer}`);
            const correctLabel = document.getElementById(`label-${currentQuestionIndex}-${item.correctIndex}`);

            // 正解の選択肢を緑色に
            correctLabel.classList.add('correct-bg');
            // ユーザーが間違えた場合は選んだものを赤色に
            if (!isCorrect) {
                selectedLabel.classList.add('incorrect-bg');
            }

            // 解説エリアの表示と装飾
            const expArea = document.getElementById('explanation-area');
            const expTitle = document.getElementById('result-status-title');
            const expIcon = document.getElementById('explanation-icon');
            
            expArea.classList.remove('hidden');
            
            if (isCorrect) {
                expTitle.textContent = "正解！";
                expTitle.className = "text-lg font-bold text-green-700 mb-1";
                expArea.className = "mt-6 p-4 bg-green-50 rounded-lg border border-green-300";
                expIcon.className = "h-6 w-6 text-green-600";
            } else {
                expTitle.textContent = "不正解...";
                expTitle.className = "text-lg font-bold text-red-700 mb-1";
                expArea.className = "mt-6 p-4 bg-red-50 rounded-lg border border-red-300";
                expIcon.className = "h-6 w-6 text-red-600";
            }

            // ボタンの切り替え
            document.getElementById('submit-answer-btn').classList.add('hidden');
            
            // 次の問題があるか、最後かでボタンを出し分ける
            if (currentQuestionIndex < totalQuestions - 1) {
                document.getElementById('next-question-btn').classList.remove('hidden');
            } else {
                document.getElementById('show-result-btn').classList.remove('hidden');
            }
        }

        // 次の問題へ進む処理
        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion(currentQuestionIndex);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 最終結果を表示する処理
        function showFinalResult() {
            // クイズエリアを隠す
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('progress-container').classList.add('hidden');
            
            // 結果エリアを表示
            const resultSection = document.getElementById('result-section');
            resultSection.classList.remove('hidden');
            
            // スコア計算と表示
            document.getElementById('score-count').textContent = score;
            const percentage = Math.round((score / totalQuestions) * 100);
            
            // プログレスバーのアニメーション
            setTimeout(() => {
                document.getElementById('score-progress').style.width = `${percentage}%`;
                document.getElementById('score-percentage-text').textContent = `${percentage}%`;
            }, 100);

            // 評価メッセージの設定
            const resultMsg = document.getElementById('result-message');
            if (percentage === 100) {
                resultMsg.textContent = "完璧です！ネットワークの基礎が完全に身についています。";
                resultMsg.className = "text-center text-lg font-bold text-green-600 mb-8";
            } else if (percentage >= 70) {
                resultMsg.textContent = "素晴らしい！合格ラインに達しています。不正解だった箇所を復習してさらに理解を深めましょう。";
                resultMsg.className = "text-center text-lg font-bold text-blue-600 mb-8";
            } else {
                resultMsg.textContent = "復習のチャンスです！解説をよく読み直して、もう一度挑戦してみましょう。";
                resultMsg.className = "text-center text-lg font-bold text-yellow-600 mb-8";
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            
            // 結果エリアを隠してプログレスバーをリセット
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('score-progress').style.width = '0%';
            
            // クイズエリアを再表示
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            
            // 第1問目を描画
            renderQuestion(currentQuestionIndex);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ページ読み込み時に第1問目を描画
        renderQuestion(currentQuestionIndex);

    </script>
</body>
</html>
